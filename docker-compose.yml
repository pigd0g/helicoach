version: '3.8'
services:
  web:
    build:
      context: .
      args:
        VITE_GA_ID: ${VITE_GA_ID}
        VITE_GOOGLE_CLIENT_ID: ${VITE_GOOGLE_CLIENT_ID}
        VITE_GOOGLE_API_KEY: ${VITE_GOOGLE_API_KEY}
    ports:
      - "8080:80"
    restart: unless-stopped
    environment:
      - NODE_ENV=production
